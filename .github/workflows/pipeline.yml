name: as-code pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: "Pre-change gate: nac-validate (syntax + semantic rules)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: nac-validate against the source of truth
        run: nac-validate -s .schema.yaml -r rules/ data/apic/
      - name: Test suite (gates verified against known-bad fixtures)
        run: pytest tests/ -v

  terraform:
    name: "Deploy stage: Network-as-Code ACI module (plan-safe validation)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: terraform init (downloads netascode/nac-aci module)
        run: terraform -chdir=terraform init -backend=false
      - name: terraform validate
        run: terraform -chdir=terraform validate
